version: "3.9"

# Production docker-compose for QuantLab AI
# Usage: docker compose -f docker-compose.prod.yml up -d
# All secrets must be set in the .env file (never commit it).

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: apexquant_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-apex}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-apexquant}
    volumes:
      - apexquant_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-apex} -d ${DB_NAME:-apexquant}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apexquant_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - apexquant_redis_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apexquant_backend_prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-apex}:${DB_PASSWORD}@db:5432/${DB_NAME:-apexquant}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      ENVIRONMENT: production
      ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-24}
    expose:
      - "8001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8001 --workers 4"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (nginx) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://backend:8001}
    container_name: apexquant_frontend_prod
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - backend
    networks:
      - internal
      - external

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: apexquant_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT_PATH:-/etc/nginx/certs}:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external

volumes:
  apexquant_pgdata_prod:
  apexquant_redis_prod:

networks:
  internal:
    internal: true
  external:
    driver: bridge
