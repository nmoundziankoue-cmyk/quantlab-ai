apiVersion: v1
kind: Secret
metadata:
  name: apexquant-secrets
  namespace: apexquant
type: Opaque
# PLACEHOLDER VALUES — replace all stringData fields before deploying.
# JWT_SECRET_KEY: python3 -c "import secrets; print(secrets.token_hex(32))"
# DATABASE_URL: use your cloud provider's managed PostgreSQL connection string
stringData:
  DATABASE_URL: "postgresql://REPLACE_USER:REPLACE_PASS@postgres-svc:5432/apexquant"
  REDIS_URL: "redis://redis-svc:6379/0"
  JWT_SECRET_KEY: "REPLACE_with_a_32_byte_hex_secret"
