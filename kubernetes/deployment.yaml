apiVersion: apps/v1
kind: Deployment
metadata:
  name: apexquant-backend
  namespace: apexquant
  labels:
    app: apexquant-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apexquant-backend
  template:
    metadata:
      labels:
        app: apexquant-backend
    spec:
      containers:
        - name: backend
          image: apexquant/backend:8.0.0
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: apexquant-config
            - secretRef:
                name: apexquant-secrets
          livenessProbe:
            httpGet:
              path: /system/health/live
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /system/health/ready
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apexquant-frontend
  namespace: apexquant
  labels:
    app: apexquant-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apexquant-frontend
  template:
    metadata:
      labels:
        app: apexquant-frontend
    spec:
      containers:
        - name: frontend
          image: apexquant/frontend:8.0.0
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
